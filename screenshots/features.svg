<svg width="900" height="420" viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0820"/>
      <stop offset="100%" style="stop-color:#0c1428"/>
    </linearGradient>
    <radialGradient id="blob1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="55%" cy="20%" r="30%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04"/>
    </linearGradient>

    <!-- Per-card accent gradients for icon backgrounds -->
    <linearGradient id="acc1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="acc3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#be185d"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="acc4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="acc5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="acc6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>

    <!-- Border gradients per card -->
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="b5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#92400e;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="b6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bg)"/>
  <rect width="900" height="420" fill="url(#blob1)"/>
  <rect width="900" height="420" fill="url(#blob2)"/>
  <rect width="900" height="420" fill="url(#blob3)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="105" x2="900" y2="105"/>
    <line x1="0" y1="210" x2="900" y2="210"/>
    <line x1="0" y1="315" x2="900" y2="315"/>
    <line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="600" y1="0" x2="600" y2="420"/>
  </g>

  <!-- Section heading -->
  <text x="450" y="40" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="3" font-weight="500">FEATURES</text>
  <line x1="310" y1="46" x2="400" y2="46" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>
  <line x1="500" y1="46" x2="590" y2="46" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- ======================== -->
  <!-- ROW 1                   -->
  <!-- ======================== -->

  <!-- CARD 1: Adaptive Colors -->
  <rect x="30" y="60" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="30" y="60" width="258" height="155" rx="18" fill="none" stroke="url(#b1)" stroke-width="1.2"/>
  <rect x="31" y="61" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <!-- Icon bg -->
  <rect x="48" y="80" width="44" height="44" rx="12" fill="url(#acc1)" opacity="0.9"/>
  <text x="70" y="108" font-size="22" text-anchor="middle" font-family="sans-serif">🎨</text>
  <!-- Title + body -->
  <text x="48" y="148" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">Adaptive Color Engine</text>
  <text x="48" y="167" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Background &amp; visualizer color</text>
  <text x="48" y="182" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">auto-extracted from album art.</text>
  <!-- Accent dot -->
  <circle cx="269" cy="80" r="5" fill="#a78bfa" opacity="0.7"/>

  <!-- CARD 2: Visualizer -->
  <rect x="321" y="60" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="321" y="60" width="258" height="155" rx="18" fill="none" stroke="url(#b2)" stroke-width="1.2"/>
  <rect x="322" y="61" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="339" y="80" width="44" height="44" rx="12" fill="url(#acc2)" opacity="0.9"/>
  <text x="361" y="108" font-size="22" text-anchor="middle" font-family="sans-serif">📊</text>
  <text x="339" y="148" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">4-Mode Visualizer</text>
  <text x="339" y="167" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Wave, Beat, Real-Time (CAVA),</text>
  <text x="339" y="182" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">or Off. GPU-accelerated 60 FPS.</text>
  <circle cx="560" cy="80" r="5" fill="#38bdf8" opacity="0.7"/>

  <!-- CARD 3: Lyrics -->
  <rect x="612" y="60" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="612" y="60" width="258" height="155" rx="18" fill="none" stroke="url(#b3)" stroke-width="1.2"/>
  <rect x="613" y="61" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="630" y="80" width="44" height="44" rx="12" fill="url(#acc3)" opacity="0.9"/>
  <text x="652" y="108" font-size="22" text-anchor="middle" font-family="sans-serif">🎵</text>
  <text x="630" y="148" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">Synchronized Lyrics</text>
  <text x="630" y="167" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Real-time lyric display synced</text>
  <text x="630" y="182" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">to playback with fade-in effects.</text>
  <circle cx="851" cy="80" r="5" fill="#f472b6" opacity="0.7"/>

  <!-- ======================== -->
  <!-- ROW 2                   -->
  <!-- ======================== -->

  <!-- CARD 4: Controls -->
  <rect x="30" y="235" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="30" y="235" width="258" height="155" rx="18" fill="none" stroke="url(#b4)" stroke-width="1.2"/>
  <rect x="31" y="236" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="48" y="255" width="44" height="44" rx="12" fill="url(#acc4)" opacity="0.9"/>
  <text x="70" y="283" font-size="22" text-anchor="middle" font-family="sans-serif">🖱️</text>
  <text x="48" y="323" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">Fully Configurable Controls</text>
  <text x="48" y="342" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Left, Double, Middle, Right click</text>
  <text x="48" y="357" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">&amp; Hover — each assigns any action.</text>
  <circle cx="269" cy="255" r="5" fill="#34d399" opacity="0.7"/>

  <!-- CARD 5: Game Mode + Placement -->
  <rect x="321" y="235" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="321" y="235" width="258" height="155" rx="18" fill="none" stroke="url(#b5)" stroke-width="1.2"/>
  <rect x="322" y="236" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="339" y="255" width="44" height="44" rx="12" fill="url(#acc5)" opacity="0.9"/>
  <text x="361" y="283" font-size="22" text-anchor="middle" font-family="sans-serif">🎮</text>
  <text x="339" y="323" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">Game Mode</text>
  <text x="339" y="342" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Auto-disables animations when</text>
  <text x="339" y="357" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">a fullscreen app is detected.</text>
  <circle cx="560" cy="255" r="5" fill="#fb923c" opacity="0.7"/>

  <!-- CARD 6: Pop-up Menu -->
  <rect x="612" y="235" width="258" height="155" rx="18" fill="url(#glass)"/>
  <rect x="612" y="235" width="258" height="155" rx="18" fill="none" stroke="url(#b6)" stroke-width="1.2"/>
  <rect x="613" y="236" width="256" height="1.5" rx="1" fill="#ffffff" opacity="0.14"/>
  <rect x="630" y="255" width="44" height="44" rx="12" fill="url(#acc6)" opacity="0.9"/>
  <text x="652" y="283" font-size="22" text-anchor="middle" font-family="sans-serif">📱</text>
  <text x="630" y="323" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="14" font-weight="700" fill="white">Rich Pop-Up Menu</text>
  <text x="630" y="342" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">Seek bar, spinning vinyl, shuffle,</text>
  <text x="630" y="357" font-family="'SF Pro Display','Helvetica Neue',sans-serif" font-size="11" fill="#94a3b8">player selector &amp; visualizer.</text>
  <circle cx="851" cy="255" r="5" fill="#60a5fa" opacity="0.7"/>

  <!-- Footer -->
  <line x1="30" y1="406" x2="870" y2="406" stroke="#ffffff" stroke-width="0.4" opacity="0.07"/>
  <text x="450" y="416" font-family="'SF Mono','Fira Mono',monospace" font-size="8.5" fill="#475569" text-anchor="middle" letter-spacing="1.5">DYNAMIC MUSIC PILL — GNOME SHELL EXTENSION</text>
</svg>
